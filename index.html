<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>东盟多语互译桥 (ZH-LO-VI) - 支持中转</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f3f4f6; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); border-radius: 1rem; }
        .loader { border-top-color: white; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* 隐藏滚动条但保留滚动功能 */
        textarea::-webkit-scrollbar { width: 6px; }
        textarea::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 3px; }
        
        /* 录音时的呼吸灯动画 */
        @keyframes pulse-red { 0% { color: #9ca3af; } 50% { color: #ef4444; } 100% { color: #9ca3af; } }
        .recording { animation: pulse-red 1.5s infinite; color: #ef4444 !important; }

        /* 自定义下拉框样式 */
        select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 0.7rem center; background-size: 1em; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex justify-center items-start">

    <div class="w-full max-w-2xl space-y-6 relative">
        <!-- 头部 -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800 mb-2"><i class="fa-solid fa-bridge-water text-blue-500 mr-2"></i>东盟多语互译桥</h1>
            <p class="text-gray-500 text-sm">通过英语作为中间逻辑桥梁，实现中、老、越精准互译</p>
        </div>

        <!-- 语言选择器 -->
        <div class="flex items-center justify-between bg-white rounded-xl shadow-sm p-2 border border-gray-100 mx-auto w-full max-w-lg">
            <div class="relative w-2/5">
                <select id="source-lang" onchange="handleLangChange('source')" data-prev="zh" class="w-full bg-gray-50 border border-gray-200 text-gray-700 py-2.5 pl-4 pr-8 rounded-lg font-medium focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all">
                    <option value="zh" selected>中文</option>
                    <option value="lo">ລາວ (老挝)</option>
                    <option value="vi">Tiếng Việt (越南)</option>
                </select>
            </div>
            
            <button onclick="swapLangs()" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-100 hover:bg-gray-200 text-gray-500 hover:text-blue-600 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-400 shadow-inner">
                <i class="fa-solid fa-right-left"></i>
            </button>

            <div class="relative w-2/5">
                <select id="target-lang" onchange="handleLangChange('target')" data-prev="lo" class="w-full bg-gray-50 border border-gray-200 text-gray-700 py-2.5 pl-4 pr-8 rounded-lg font-medium focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all">
                    <option value="zh">中文</option>
                    <option value="lo" selected>ລາວ (老挝)</option>
                    <option value="vi">Tiếng Việt (越南)</option>
                </select>
            </div>
        </div>

        <!-- 统一翻译框 -->
        <div id="card-main" class="glass-card p-5 border-t-4 border-blue-500 transition-colors duration-300 shadow-lg mt-4">
            <!-- 输入区 -->
            <div class="flex justify-between items-center mb-2">
                <label id="label-source" class="text-sm font-semibold text-gray-700">原文 (中文)</label>
                <div class="space-x-3">
                    <button id="btn-voice" onclick="toggleVoiceInput()" class="text-gray-400 hover:text-blue-500 text-xs transition-colors"><i class="fa-solid fa-microphone mr-1"></i><span id="txt-voice">语音录入</span></button>
                    <button onclick="clearText('source-input')" class="text-gray-400 hover:text-red-500 text-xs transition-colors"><i class="fa-solid fa-trash mr-1"></i>清空</button>
                </div>
            </div>
            <textarea id="source-input" rows="4" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none resize-none text-gray-800 placeholder-gray-400" placeholder="请输入或语音录入..."></textarea>
            
            <!-- 翻译按钮 -->
            <button id="btn-translate-all" onclick="translateAll()" class="mt-4 mb-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition-colors flex justify-center items-center shadow-md">
                <span id="txt-translate-all">开始翻译 (中文 ➔ 老挝语)</span>
                <div id="loader-translate-all" class="loader border-2 border-white border-solid rounded-full w-5 h-5 ml-2 hidden"></div>
            </button>

            <hr class="border-gray-200 mb-4">

            <!-- 输出区 -->
            <div class="flex justify-between items-center mb-2">
                <label id="label-target" class="text-sm font-semibold text-gray-700">翻译结果 (老挝语)</label>
                <button onclick="copyToClipboard('target-output')" class="bg-gray-100 text-gray-600 hover:bg-gray-200 py-1 px-3 rounded text-xs font-medium transition-colors"><i class="fa-regular fa-copy mr-1"></i>复制文字</button>
            </div>
            <div id="target-output" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-lg min-h-[120px] text-lg text-gray-800 break-words whitespace-pre-wrap">翻译结果将在这里显示...</div>
        </div>

        <!-- 提示信息弹窗 -->
        <div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-50 whitespace-nowrap">
            提示信息
        </div>
    </div>

    <script>
        // ======= API 配置区 =======
        
        // 1. 填入您的 API Key
        const apiKey = "sk-Rfp1a81d0e27d2b9c18d75f1a91fa6a3ad0ff9cdcb1QM3Lf"; 
        
        // 判断是否为中转平台密钥
        const isProxyKey = apiKey.startsWith('sk-');

        // 2. 【核心修复】智能选择模型版本
        // 报错 model not found 是因为中转平台系统里没有录入 gemini 的名称映射。
        // 对于这类中转平台，使用 `gpt-4o-mini` 是 100% 存在的，而且速度和质量与 gemini 几乎一致。
        const MODEL_NAME = isProxyKey ? "gpt-4o-mini" : "gemini-1.5-flash"; 

        // 3. 中转 API 基础地址
        const API_BASE_URL = "https://api.gptsapi.net";
        
        // 如果是 sk- 中转，使用通用的 /v1/chat/completions 接口；如果是官方 AIza，使用原生 /v1beta 接口
        const API_URL = isProxyKey
            ? `${API_BASE_URL}/v1/chat/completions`
            : `${API_BASE_URL}/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`;

        // 构建请求头
        const reqHeaders = {
            'Content-Type': 'application/json'
        };
        // sk- 密钥放入 Authorization
        if (isProxyKey) {
            reqHeaders['Authorization'] = `Bearer ${apiKey}`;
        }

        // ======= 语言配置字典 =======
        const langs = {
            'zh': { code: 'zh', name: '中文', shortName: '中文', speechCode: 'zh-CN', enName: 'Chinese', theme: 'border-blue-500', btnTheme: 'bg-blue-600 hover:bg-blue-700' },
            'lo': { code: 'lo', name: 'ພາສາລາວ (老挝语)', shortName: 'ລາວ', speechCode: 'lo-LA', enName: 'Lao', theme: 'border-rose-500', btnTheme: 'bg-rose-600 hover:bg-rose-700' },
            'vi': { code: 'vi', name: 'Tiếng Việt (越南语)', shortName: 'Việt', speechCode: 'vi-VN', enName: 'Vietnamese', theme: 'border-emerald-500', btnTheme: 'bg-emerald-600 hover:bg-emerald-700' }
        };

        // ======= UI 更新逻辑 =======
        // 防止源语言和目标语言相同
        function handleLangChange(changedSelect) {
            const srcEl = document.getElementById('source-lang');
            const tgtEl = document.getElementById('target-lang');
            
            if (srcEl.value === tgtEl.value) {
                // 如果用户选择了相同的语言，把另一个下拉框换成之前的值
                if (changedSelect === 'source') {
                    tgtEl.value = srcEl.dataset.prev;
                } else {
                    srcEl.value = tgtEl.dataset.prev;
                }
            }
            
            srcEl.dataset.prev = srcEl.value;
            tgtEl.dataset.prev = tgtEl.value;
            
            updateUI();
        }

        // 交换源语言和目标语言
        function swapLangs() {
            const srcEl = document.getElementById('source-lang');
            const tgtEl = document.getElementById('target-lang');
            
            const temp = srcEl.value;
            srcEl.value = tgtEl.value;
            tgtEl.value = temp;
            
            srcEl.dataset.prev = srcEl.value;
            tgtEl.dataset.prev = tgtEl.value;
            
            updateUI();
        }

        // 根据选择的语言更新界面文字和颜色
        function updateUI() {
            const srcCode = document.getElementById('source-lang').value;
            const tgtCode = document.getElementById('target-lang').value;
            const srcLang = langs[srcCode];
            const tgtLang = langs[tgtCode];

            // 更新 Labels
            document.getElementById('label-source').innerText = `原文 (${srcLang.name})`;
            document.getElementById('label-target').innerText = `翻译结果 (${tgtLang.name})`;
            
            // 更新 Placeholder
            document.getElementById('source-input').placeholder = `请输入或语音录入${srcLang.shortName}...`;
            document.getElementById('target-output').innerText = `翻译结果将在这里显示...`;

            // 更新按钮文字
            document.getElementById('txt-translate-all').innerText = `开始翻译 (${srcLang.shortName} ➔ ${tgtLang.shortName})`;

            // 更新主题颜色 (跟随源语言)
            const cardMain = document.getElementById('card-main');
            cardMain.className = `glass-card p-5 border-t-4 ${srcLang.theme} transition-colors duration-300 shadow-lg mt-4`;
            
            const btnTranslateAll = document.getElementById('btn-translate-all');
            btnTranslateAll.className = `mt-4 mb-4 w-full ${srcLang.btnTheme} text-white font-medium py-3 px-4 rounded-lg transition-colors flex justify-center items-center shadow-md`;

            // 更新语音识别语言
            if (recognition) {
                recognition.lang = srcLang.speechCode;
            }

            if (isRecording) stopVoiceInput();
        }

        // ======= 语音识别逻辑 =======
        let recognition = null;
        let isRecording = false;

        window.onload = function() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                document.getElementById('btn-voice').style.display = 'none';
                console.warn("当前浏览器不支持 Web Speech API，已隐藏语音按钮。");
            }
            updateUI(); // 初始化界面
        };

        function toggleVoiceInput() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                showToast("您的浏览器不支持语音输入，请使用 Chrome 或 Edge。");
                return;
            }

            if (isRecording) {
                stopVoiceInput();
                return;
            }

            if (!recognition) {
                recognition = new SpeechRecognition();
                
                recognition.continuous = true;
                recognition.interimResults = false;
                
                recognition.onstart = function() {
                    isRecording = true;
                    document.getElementById('btn-voice').classList.add('recording');
                    document.getElementById('txt-voice').innerText = '聆听中...';
                    showToast("请开始说话...");
                };

                recognition.onresult = function(event) {
                    let finalTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            finalTranscript += event.results[i][0].transcript;
                        }
                    }
                    if (finalTranscript) {
                        const inputEl = document.getElementById('source-input');
                        const srcCode = document.getElementById('source-lang').value;
                        const separator = srcCode === 'zh' ? '，' : ' ';
                        inputEl.value += (inputEl.value ? separator : '') + finalTranscript; 
                    }
                };

                recognition.onerror = function(event) {
                    console.error("Speech recognition error:", event.error);
                    showToast("语音识别结束或出错：" + event.error);
                    stopVoiceInput();
                };

                recognition.onend = function() {
                    stopVoiceInput();
                };
            }

            // 启动前确保语种是最新的
            const srcCode = document.getElementById('source-lang').value;
            recognition.lang = langs[srcCode].speechCode;

            try {
                recognition.start();
            } catch (e) {
                console.error(e);
                stopVoiceInput();
            }
        }

        function stopVoiceInput() {
            if (recognition && isRecording) {
                recognition.stop();
            }
            isRecording = false;
            const btnVoice = document.getElementById('btn-voice');
            if (btnVoice) {
                btnVoice.classList.remove('recording');
                document.getElementById('txt-voice').innerText = '语音录入';
            }
        }

        // ======= 翻译核心逻辑 =======
        async function fetchWithRetry(url, options, maxRetries = 2) { 
            const delays = [1000, 2000];
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    
                    if (!response.ok) {
                        let errorDetail = "";
                        try {
                            const errorData = await response.json();
                            // 兼容提取不同中转平台的错误信息格式
                            if (errorData.error && errorData.error.message) {
                                errorDetail = errorData.error.message;
                            } else if (errorData.message) {
                                errorDetail = errorData.message;
                            }
                        } catch (e) { }
                        throw new Error(`HTTP Error ${response.status}: ${errorDetail}`);
                    }
                    return await response.json();
                } catch (error) {
                    if (i === maxRetries - 1 || error.message.includes("Failed to fetch")) {
                        throw error;
                    }
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }

        async function translateAll() {
            if (isRecording) stopVoiceInput();

            const sourceText = document.getElementById('source-input').value.trim();
            if (!sourceText) {
                showToast("请输入需要翻译的内容");
                return;
            }

            setLoading('translate-all', true);

            const srcCode = document.getElementById('source-lang').value;
            const tgtCode = document.getElementById('target-lang').value;
            const sourceLangEn = langs[srcCode].enName;
            const targetLangEn = langs[tgtCode].enName;

            // 提示词设计
            const systemPrompt = `You are an expert professional translator, proficient in Asian languages including Chinese, Lao, Vietnamese, and English. 
Your task is to FIRST internally translate the provided ${sourceLangEn} text into highly accurate and logical English (acting as a pivot language to ensure strict logic and structure are maintained). SECOND, translate that exact English meaning into natural, culturally appropriate ${targetLangEn}. 

You MUST return the result strictly in valid JSON format exactly like this (do NOT return any markdown formatting or extra text):
{
    "english": "The internal intermediate English translation (for logic alignment)",
    "target": "The final ${targetLangEn} translation"
}`;
            
            // 【双引擎构建】根据当前走的协议组装对应的数据体
            let payload;
            if (isProxyKey) {
                // OpenAI 的消息体格式
                payload = {
                    model: MODEL_NAME,
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: `Original ${sourceLangEn} text: ${sourceText}` }
                    ],
                    // 强制要求 OpenAI 返回 JSON 格式，防止解析错误
                    response_format: { type: "json_object" } 
                };
            } else {
                // 原生 Gemini 的消息体格式
                payload = {
                    contents: [
                        { 
                            role: "user", 
                            parts: [{ text: `${systemPrompt}\n\n---\nOriginal ${sourceLangEn} text: ${sourceText}` }] 
                        }
                    ]
                };
            }

            try {
                const data = await fetchWithRetry(API_URL, {
                    method: 'POST',
                    headers: reqHeaders,
                    body: JSON.stringify(payload)
                });

                // 【双引擎解析】根据当前走的协议提取返回的文本
                let resultText = "";
                if (isProxyKey) {
                    resultText = data.choices?.[0]?.message?.content;
                } else {
                    resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                }

                if (resultText) {
                    // 过滤掉大模型有时会自动包裹的 Markdown JSON 标签，防止 JSON.parse 报错
                    resultText = resultText.replace(/```json/gi, '').replace(/```/g, '').trim();
                    const parsedResult = JSON.parse(resultText);
                    document.getElementById('target-output').innerText = parsedResult.target;
                    document.getElementById('target-output').style.color = "#1f2937"; // 恢复正常颜色
                    showToast("翻译完成！");
                } else {
                    throw new Error("Invalid response form API (No content)");
                }
            } catch (error) {
                console.error("Translation Error:", error);
                
                // 将具体的错误信息展示在界面上
                let friendlyMsg = "⚠️ 发生错误：\n";
                if (error.message.includes("Failed to fetch")) {
                    friendlyMsg += "网络请求被拦截。请检查您的网络环境，或确认 API_BASE_URL。";
                } else if (error.message.includes("403") || error.message.includes("API key") || error.message.includes("401")) {
                    friendlyMsg += "API Key 无效、已过期或平台配额不足。请确认中转平台的 Key 状态。";
                } else if (error.message.includes("404")) {
                    friendlyMsg += "中转平台未提供该模型的访问权限。";
                } else {
                    friendlyMsg += error.message;
                }

                document.getElementById('target-output').innerText = friendlyMsg;
                document.getElementById('target-output').style.color = "#dc2626"; // 设置错误文字为红色
                showToast("请求失败，请查看错误详情");
            } finally {
                setLoading('translate-all', false);
            }
        }

        // ======= 工具函数 =======
        function setLoading(buttonIdPrefix, isLoading) {
            const textEl = document.getElementById(`txt-${buttonIdPrefix}`);
            const loaderEl = document.getElementById(`loader-${buttonIdPrefix}`);
            const btnEl = document.getElementById(`btn-${buttonIdPrefix}`);
            
            if (isLoading) {
                textEl.style.opacity = '0.5';
                loaderEl.classList.remove('hidden');
                btnEl.disabled = true;
                btnEl.classList.add('cursor-not-allowed');
            } else {
                textEl.style.opacity = '1';
                loaderEl.classList.add('hidden');
                btnEl.disabled = false;
                btnEl.classList.remove('cursor-not-allowed');
            }
        }

        function clearText(elementId) {
            document.getElementById(elementId).value = '';
            document.getElementById('target-output').innerText = "翻译结果将在这里显示...";
            document.getElementById('target-output').style.color = "#1f2937"; // 恢复正常颜色
        }

        function copyToClipboard(elementId) {
            let textToCopy = "";
            const element = document.getElementById(elementId);
            
            if (element.tagName === 'TEXTAREA' || element.tagName === 'INPUT') {
                textToCopy = element.value;
            } else {
                textToCopy = element.innerText;
            }

            if (!textToCopy || textToCopy.includes('翻译结果将在这里显示') || textToCopy.includes('⚠️ 发生错误')) {
                showToast("没有可复制的内容");
                return;
            }

            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast("复制成功！");
            } catch (err) {
                showToast("复制失败");
            }
            document.body.removeChild(textArea);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 3000);
        }
    </script>
</body>
</html>
